<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Acompanhamento — WM Engenharia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1e2535;min-height:100vh}
.hdr{background:linear-gradient(135deg,#1a3a6b,#2563a8);padding:0 24px;box-shadow:0 4px 20px rgba(26,58,107,.3)}
.hdr-in{max-width:820px;margin:0 auto;display:flex;align-items:center;padding:16px 0}
.logo{color:#fff;font-size:22px;font-weight:900;letter-spacing:1px;line-height:1}
.logo span{display:block;color:#56bfe9;font-size:9px;letter-spacing:3px;font-weight:700;margin-top:2px}
.main{max-width:820px;margin:0 auto;padding:28px 20px 40px}
.card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(26,58,107,.08);border:1px solid #e8eef5;margin-bottom:20px}
.ctitle{font-size:14px;font-weight:700;color:#1a3a6b;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.ibox{background:#f0f4f8;border-radius:10px;padding:12px 14px}
.ilabel{font-size:10px;font-weight:700;color:#8492a6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.ival{font-size:14px;font-weight:700;color:#1e2535}
.ival.blue{color:#2563a8}
.ival.green{color:#22c55e}
.ival.red{color:#ef4444}
.ival.orange{color:#f59e0b}
.banner{border-radius:14px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:flex-start;gap:16px;border-width:2px;border-style:solid}
.banner-emoji{font-size:36px;flex-shrink:0;margin-top:2px}
.banner-status-label{font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:4px}
.banner-status-val{font-size:20px;font-weight:900}
.banner-msg{margin-top:10px;padding:10px 14px;border-radius:8px;background:rgba(0,0,0,.05);font-size:13px;color:#374151;border-left-width:3px;border-left-style:solid;font-style:italic}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-label{font-size:13px;font-weight:600;color:#1e2535}
.prog-pct{font-size:20px;font-weight:900}
.prog-track{background:#e8eef5;border-radius:8px;height:16px;overflow:hidden}
.prog-fill{height:16px;border-radius:8px;width:0%;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.prog-scale{display:flex;justify-content:space-between;font-size:10px;color:#8492a6;margin-top:4px}
.team-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.team-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#eff6ff;border-radius:20px;font-size:12px;font-weight:700;color:#1d4ed8;border:1px solid #bfdbfe}
.team-chip.main-chip{background:#1a3a6b;color:#56bfe9;border-color:#1a3a6b}
.tl{display:flex;flex-direction:column}
.tl-item{display:flex;gap:14px;padding-bottom:18px}
.tl-item:last-child{padding-bottom:0}
.tl-left{display:flex;flex-direction:column;align-items:center;width:38px;flex-shrink:0}
.tl-icon-wrap{width:38px;height:38px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:2px solid #e0edff}
.tl-line{width:2px;background:#e8eef5;flex:1;margin-top:4px}
.tl-item:last-child .tl-line{display:none}
.tl-body{flex:1;padding-top:6px}
.tl-titulo{font-size:14px;font-weight:700;color:#1e2535}
.tl-desc{font-size:13px;color:#6b7280;margin-top:4px;line-height:1.6}
.tl-meta{font-size:11px;color:#8492a6;margin-top:6px;display:flex;gap:14px;flex-wrap:wrap}
.entrega-box{border-radius:10px;padding:14px;text-align:center}
.eb-label{font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:6px;text-transform:uppercase}
.eb-val{font-size:20px;font-weight:900}
.result-badge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700;margin:12px auto 0;display:block;text-align:center}
.loading{text-align:center;padding:80px 20px;color:#8492a6}
.spin{width:44px;height:44px;border:3px solid #e8eef5;border-top-color:#2563a8;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 16px}
@keyframes sp{to{transform:rotate(360deg)}}
.erro-wrap{text-align:center;padding:80px 20px}
.ftr{text-align:center;padding:20px;color:#8492a6;font-size:11px}
.refresh-bar{text-align:center;padding:8px;font-size:11px;color:#8492a6;margin-bottom:8px}
@media(max-width:580px){.grid2,.grid3{grid-template-columns:1fr}.banner{flex-direction:column;gap:8px}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-in">
    <div class="logo">WM <span>ENGENHARIA INTEGRADA</span></div>
    <div style="margin-left:auto;color:rgba(255,255,255,.6);font-size:12px">Portal do Cliente</div>
  </div>
</div>

<div class="main" id="app">
  <div class="loading"><div class="spin"></div><p>Carregando informações do projeto...</p></div>
</div>

<div class="ftr">Desenvolvido por <strong style="color:#2563a8">WM Engenharia</strong> &middot; Portal exclusivo para acompanhamento de projetos</div>

<script>
// ── Configurações de status ─────────────────────────────────────────────────
var ST = {
  "Em andamento":{"cor":"#2563a8","bg":"#e8f4fd","emoji":"🔵"},
  "CONCLUIDO":   {"cor":"#22c55e","bg":"#f0fdf4","emoji":"✅"},
  "CONCLUÍDO":   {"cor":"#22c55e","bg":"#f0fdf4","emoji":"✅"},
  "PAUSADO":     {"cor":"#f59e0b","bg":"#fffbeb","emoji":"⏸️"},
  "ATRASADO":    {"cor":"#ef4444","bg":"#fef2f2","emoji":"⚠️"},
  "Novo/Definir":{"cor":"#8492a6","bg":"#f8fafc","emoji":"⭕"},
  "CANCELADO":   {"cor":"#6b7280","bg":"#f3f4f6","emoji":"❌"}
};

var TIPOS = {
  PE:"Projeto Estrutural",PR:"Projeto de Reforço",LT:"Laudo Técnico",
  CB:"Compatibilização",EL:"Projeto Elétrico",PH:"Projeto Hidrossanitário",
  PA:"Proj. Ar-Condicionado",PF:"Projeto de Fundação",CT:"Consultoria",RE:"Revisão"
};

// ── Utilitários ─────────────────────────────────────────────────────────────
function fmtData(d){
  if(!d) return "—";
  var p=d.slice(0,10).split("-");
  return p[2]+"/"+p[1]+"/"+p[0];
}
function diasAte(d){
  if(!d) return null;
  return Math.ceil((new Date(d+"T12:00:00")-new Date())/86400000);
}
function tempoAtras(iso){
  if(!iso) return "";
  var diff=Math.floor((new Date()-new Date(iso))/86400000);
  if(diff===0) return "Hoje";
  if(diff===1) return "Ontem";
  if(diff<7)   return diff+"d atrás";
  return fmtData(iso);
}
function corProg(p){
  if(p>=80) return "#22c55e";
  if(p>=50) return "#f59e0b";
  return "#2563a8";
}
function el(tag,cls,html,style){
  var s='<'+tag+(cls?' class="'+cls+'"':'')+(style?' style="'+style+'"':'')+'>'+(html||'')+'</'+tag+'>';
  return s;
}

// ── Render erro ─────────────────────────────────────────────────────────────
function renderErro(msg){
  document.getElementById("app").innerHTML=
    '<div class="erro-wrap">'+
    '<div style="font-size:56px;margin-bottom:16px">🔒</div>'+
    '<div style="font-size:20px;font-weight:800;color:#1a3a6b;margin-bottom:8px">Link não disponível</div>'+
    '<div style="color:#8492a6;font-size:14px">'+(msg||"Este link não existe ou foi desativado.")+'</div>'+
    '<div style="margin-top:20px;font-size:12px;color:#8492a6">Dúvidas? Fale com a equipe WM:<br>'+
    '<a href="mailto:direcao@engenhariaWM.com.br" style="color:#2563a8">direcao@engenhariaWM.com.br</a></div>'+
    '</div>';
}

// ── Render principal ─────────────────────────────────────────────────────────
function render(d){
  var app  = document.getElementById("app");
  var st   = ST[d.status] || ST["Novo/Definir"];
  var prog = Math.min(100,Math.max(0,d.progresso||0));
  var tipo = TIPOS[d.tipo]||d.tipo||"";
  var atus = d.atualizacoes||[];
  var dias = diasAte(d.dataEntregaPrevista);

  var html = "";

  // 1. Banner de status
  html += '<div class="banner" style="background:'+st.bg+';border-color:'+st.cor+'30">';
  html += '<div class="banner-emoji">'+st.emoji+'</div>';
  html += '<div style="flex:1">';
  html += '<div class="banner-status-label" style="color:'+st.cor+'">STATUS ATUAL</div>';
  html += '<div class="banner-status-val" style="color:'+st.cor+'">'+d.status+'</div>';
  if(d.obs){
    html += '<div class="banner-msg" style="border-left-color:'+st.cor+'">💬 '+d.obs+'</div>';
  }
  html += '</div></div>';

  // 2. Informações do projeto
  html += '<div class="card">';
  html += '<div class="ctitle">📋 Informações do Projeto</div>';

  // Código + tipo
  html += '<div class="grid2" style="margin-bottom:12px">';
  html += '<div class="ibox"><div class="ilabel">Código</div><div class="ival blue">'+d.codigo+'</div></div>';
  html += '<div class="ibox"><div class="ilabel">Tipo</div><div class="ival">'+tipo+'</div></div>';
  html += '</div>';

  // Cliente (full width)
  html += '<div class="ibox" style="margin-bottom:12px">';
  html += '<div class="ilabel">Projeto</div>';
  html += '<div class="ival" style="font-size:15px">'+d.cliente+'</div>';
  html += '</div>';

  // Equipe responsável
  var equipe = [];
  if(d.responsavel)   equipe.push({nome:d.responsavel, main:true});
  if(d.coresponsavel)  equipe.push({nome:d.coresponsavel, main:false});
  if(d.coresponsavel2) equipe.push({nome:d.coresponsavel2, main:false});
  if(d.coresponsavel3) equipe.push({nome:d.coresponsavel3, main:false});

  if(equipe.length>0){
    html += '<div class="ibox" style="margin-bottom:12px">';
    html += '<div class="ilabel">Equipe Responsável</div>';
    html += '<div class="team-row">';
    for(var i=0;i<equipe.length;i++){
      html += '<div class="team-chip'+(equipe[i].main?' main-chip':'')+'">'+
              (equipe[i].main?'👤 ':'&nbsp;&nbsp;')+equipe[i].nome+'</div>';
    }
    html += '</div></div>';
  }

  // Contrato + prazo + entrega prevista
  var temInfoData = d.dataContrato||d.prazo||d.dataEntregaPrevista;
  if(temInfoData){
    var ncols = [d.dataContrato,d.prazo,d.dataEntregaPrevista].filter(Boolean).length;
    var gcls  = ncols>=3?"grid3":"grid2";
    html += '<div class="'+gcls+'">';
    if(d.dataContrato){
      html += '<div class="ibox"><div class="ilabel">Contrato Assinado</div><div class="ival">'+fmtData(d.dataContrato)+'</div></div>';
    }
    if(d.prazo){
      html += '<div class="ibox"><div class="ilabel">Prazo</div><div class="ival">'+d.prazo+' dias úteis</div></div>';
    }
    if(d.dataEntregaPrevista){
      var prazoInfo="";
      if(!d.dataEntregaReal&&dias!==null){
        if(dias<0)      prazoInfo=' <span style="color:#ef4444;font-size:11px">('+Math.abs(dias)+'d em atraso)</span>';
        else if(dias===0) prazoInfo=' <span style="color:#f59e0b;font-size:11px">(vence hoje!)</span>';
        else            prazoInfo=' <span style="color:#8492a6;font-size:11px">('+dias+'d restantes)</span>';
      }
      html += '<div class="ibox"><div class="ilabel">Entrega Prevista '+prazoInfo+'</div><div class="ival">'+fmtData(d.dataEntregaPrevista)+'</div></div>';
    }
    html += '</div>';
  }
  html += '</div>'; // card

  // 3. Progresso
  html += '<div class="card">';
  html += '<div class="ctitle">📊 Progresso do Projeto</div>';
  html += '<div class="prog-row">';
  html += '<span class="prog-label">Conclusão geral</span>';
  html += '<span class="prog-pct" id="prog-pct" style="color:'+corProg(prog)+'">'+prog+'%</span>';
  html += '</div>';
  html += '<div class="prog-track"><div class="prog-fill" id="prog-fill" style="background:'+corProg(prog)+'"></div></div>';
  html += '<div class="prog-scale"><span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span></div>';

  // Comparativo de entrega
  if(d.dataEntregaReal&&d.dataEntregaPrevista){
    var atraso=Math.ceil((new Date(d.dataEntregaReal+"T12:00:00")-new Date(d.dataEntregaPrevista+"T12:00:00"))/86400000);
    html += '<div class="grid2" style="margin-top:16px">';
    html += '<div class="entrega-box" style="background:#f0fdf4;border:1px solid #86efac">';
    html += '<div class="eb-label" style="color:#166534">Entrega Prevista</div>';
    html += '<div class="eb-val" style="color:#166534">'+fmtData(d.dataEntregaPrevista)+'</div>';
    html += '</div>';
    html += '<div class="entrega-box" style="background:#eff6ff;border:1px solid #bfdbfe">';
    html += '<div class="eb-label" style="color:#1d4ed8">Entrega Real</div>';
    html += '<div class="eb-val" style="color:#1d4ed8">'+fmtData(d.dataEntregaReal)+'</div>';
    html += '</div></div>';
    if(atraso<=0){
      html += '<div class="result-badge" style="background:#f0fdf4;color:#166534">✓ Entregue no prazo'+(atraso<0?' ('+Math.abs(atraso)+'d antes)':'')+'</div>';
    } else {
      html += '<div class="result-badge" style="background:#fef2f2;color:#dc2626">⚠ Entregue com '+atraso+'d de atraso</div>';
    }
  }
  html += '</div>'; // card progresso

  // 4. Timeline
  html += '<div class="card">';
  html += '<div class="ctitle">🕐 Histórico de Atualizações</div>';
  if(atus.length===0){
    html += '<p style="color:#8492a6;text-align:center;padding:20px 0;font-size:13px">Nenhuma atividade registrada neste projeto ainda.</p>';
  } else {
    html += '<div class="tl">';
    for(var j=0;j<atus.length;j++){
      var a=atus[j];
      var isSessao = a.origem==="sessao" || a.tipo==="sessao";
      var iconeBg  = isSessao ? "#f0fdf4" : "#eff6ff";
      var iconeBorder = isSessao ? "#86efac" : "#e0edff";
      var tagHTML  = isSessao
        ? '<span style="font-size:10px;background:#f0fdf4;color:#166534;padding:2px 8px;border-radius:10px;font-weight:700;border:1px solid #86efac;margin-left:6px">Execução</span>'
        : '<span style="font-size:10px;background:#eff6ff;color:#1d4ed8;padding:2px 8px;border-radius:10px;font-weight:700;border:1px solid #bfdbfe;margin-left:6px">Atualização</span>';
      html += '<div class="tl-item">';
      html += '<div class="tl-left">';
      html += '<div class="tl-icon-wrap" style="background:'+iconeBg+';border-color:'+iconeBorder+'">'+(a.icone||"📝")+'</div>';
      html += '<div class="tl-line"></div>';
      html += '</div>';
      html += '<div class="tl-body">';
      html += '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">';
      html += '<div class="tl-titulo">'+(a.titulo||"Atualização")+'</div>';
      html += tagHTML;
      html += '</div>';
      if(a.descricao) html += '<div class="tl-desc">'+a.descricao+'</div>';
      html += '<div class="tl-meta">';
      if(a.autor) html += '<span>👤 '+a.autor+'</span>';
      html += '<span>📅 '+tempoAtras(a.data)+'</span>';
      html += '</div></div></div>';
    }
    html += '</div>';
  }
  html += '</div>'; // card timeline

  // Rodapé de atualização
  html += '<div class="refresh-bar">'+
    'Última atualização: '+(atus.length>0?tempoAtras(atus[0].data):"—")+
    ' &nbsp;·&nbsp; <a href="#" onclick="window.location.reload();return false;" style="color:#2563a8;text-decoration:none">🔄 Atualizar</a>'+
    '</div>';

  // Renderizar
  app.innerHTML = html;

  // Animar barra de progresso depois que o DOM existir
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      var fill = document.getElementById("prog-fill");
      if(fill) fill.style.width = prog+"%";
    });
  });

  // Popup de entregáveis quando progresso = 100%
  if(prog>=100 && d.driveEntregaveis){
    var popupEl = document.createElement("div");
    popupEl.id = "popup-entregaveis";
    popupEl.style.cssText = "position:fixed;inset:0;background:rgba(15,25,50,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px";

    var inner = document.createElement("div");
    inner.style.cssText = "background:#fff;border-radius:20px;padding:36px 32px;max-width:480px;width:100%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.3)";

    var emoji = document.createElement("div");
    emoji.style.cssText = "font-size:56px;margin-bottom:12px";
    emoji.textContent = "🎉";

    var titulo = document.createElement("h2");
    titulo.style.cssText = "color:#1a3a6b;margin:0 0 8px;font-size:22px;font-weight:900";
    titulo.textContent = "Projeto Concluído!";

    var desc = document.createElement("p");
    desc.style.cssText = "color:#6b7280;font-size:14px;margin:0 0 24px;line-height:1.6";
    desc.textContent = "Seus entregáveis estão disponíveis para download na pasta do Google Drive.";

    var link = document.createElement("a");
    link.href = d.driveEntregaveis;
    link.target = "_blank";
    link.rel = "noreferrer";
    link.style.cssText = "display:inline-block;background:linear-gradient(135deg,#1a3a6b,#2563a8);color:#fff;padding:14px 28px;border-radius:10px;text-decoration:none;font-weight:700;font-size:15px;margin-bottom:16px";
    link.textContent = "📂 Acessar Entregáveis";

    var fechar = document.createElement("button");
    fechar.style.cssText = "display:block;margin:12px auto 0;background:none;border:none;color:#8492a6;cursor:pointer;font-size:13px;font-family:inherit";
    fechar.textContent = "Fechar";
    fechar.onclick = function(){ popupEl.remove(); };

    inner.appendChild(emoji);
    inner.appendChild(titulo);
    inner.appendChild(desc);
    inner.appendChild(link);
    inner.appendChild(fechar);
    popupEl.appendChild(inner);
    document.body.appendChild(popupEl);
  }
}

// ── Init ────────────────────────────────────────────────────────────────────
async function init(){
  var partes = window.location.pathname.split("/");
  var idx    = partes.indexOf("cliente");
  var token  = idx>=0 ? partes[idx+1] : null;
  if(!token) token = new URLSearchParams(window.location.search).get("token");
  if(!token||token==="") { renderErro("Token não informado na URL."); return; }

  try {
    var res  = await fetch("/api/cliente?token="+encodeURIComponent(token));
    var data = await res.json();
    if(!res.ok){ renderErro(data.error||"Erro ao carregar."); return; }
    render(data);
  } catch(e){
    renderErro("Não foi possível carregar os dados do projeto.");
  }
}

init();
setInterval(init, 2*60*1000); // atualiza a cada 2 minutos
</script>
</body>
</html>
