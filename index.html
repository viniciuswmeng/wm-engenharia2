<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d1e35" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WM" />

    <!-- Ícones -->
    <link rel="icon" type="image/png" href="/Logo_Quadrada.png" />
    <link rel="apple-touch-icon" href="/Logo_Quadrada.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/Logo_Quadrada.png" />

    <!-- SEO -->
    <meta name="description" content="Sistema de controle de projetos — WM Engenharia" />
    <meta name="application-name" content="WM" />

    <title>WM Engenharia</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Registrar Service Worker (PWA) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrado:', reg.scope))
            .catch(err => console.warn('SW falhou:', err));
        });
      }
    </script>
  </body>
</html>
